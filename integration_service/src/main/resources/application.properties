spring.application.name=integration_service
server.port=8082

# Local secrets: copy application-local.properties.example → application-local.properties
# and set apyhub.token=... (same directory you use as the working directory when starting the app).
# Optional: .env with apyhub.token=... or export APYHUB_TOKEN=...
spring.config.import=optional:file:application-local.properties,optional:file:.env

# ApyHub — do not put the real token in this file; use application-local.properties instead.
apyhub.base-url=https://api.apyhub.com
